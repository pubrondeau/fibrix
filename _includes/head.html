<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.og_title | default: page.title }}">
  <meta property="og:description" content="{{ page.og_description | default: page.description | default: site.description }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.canonical | default: site.url | append: page.url }}">
  <meta property="og:image" content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}/assets/images/logo-primary.png{% endif %}">
  <meta property="og:site_name" content="Fibrix Broadband">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.og_title | default: page.title }}">
  <meta name="twitter:description" content="{{ page.og_description | default: page.description | default: site.description }}">
  <meta name="twitter:image" content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}/assets/images/logo-primary.png{% endif %}">
  <link rel="canonical" href="{{ page.canonical | default: site.url | append: page.url }}">
  <title>{{ page.title }}</title>
  <link rel="icon" type="image/png" href="/assets/images/logo-primary.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c11111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/assets/images/logo-primary.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="alternate" type="application/rss+xml" title="Fibrix Blog" href="/feed.xml">
  {% if page.include_jsonld %}{% include jsonld-homepage.html %}{% endif %}
</head>
