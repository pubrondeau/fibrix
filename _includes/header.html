<header class="header">
  <div class="container">
    <a href="/index.html" class="logo">
      <img src="/assets/images/logo-primary.png" alt="Fibrix Broadband">
    </a>
    <nav class="nav-links" id="navLinks">
      <a href="/index.html"{% if page.nav_active == 'home' %} class="active"{% endif %}>Home</a>
      {% if page.nav_active == 'home' %}
      <a href="#iptv">IPTV</a>
      <a href="#ott">OTT</a>
      {% else %}
      <a href="/index.html#iptv">IPTV</a>
      <a href="/index.html#ott">OTT</a>
      {% endif %}
      <a href="/about.html"{% if page.nav_active == 'about' %} class="active"{% endif %}>About Us</a>
      <a href="/contact.html"{% if page.nav_active == 'contact' %} class="active"{% endif %}>Contact Us</a>
      <a href="/blog.html"{% if page.nav_active == 'blog' or page.layout == 'post' %} class="active"{% endif %}>Blog</a>
      <a href="https://pay.fibrixllp.org/customer_portal">Pay Bill</a>
    </nav>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
</header>
